kind = "web"
previewPath = "/"
title = "DDBOt"
version = "1.0.0"
id = "artifacts/ddbot-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23030

[services.development]
run = "pnpm --filter @workspace/ddbot-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ddbot-app", "run", "build" ]
publicDir = "artifacts/ddbot-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23030"
BASE_PATH = "/"
